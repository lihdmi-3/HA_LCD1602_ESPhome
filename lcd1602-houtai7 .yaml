esphome:
  name: lcd1602
  friendly_name: LCD1602 Display
  on_boot:
    priority: 600
    then:
      - lambda: |-
          id(restart_count) += 1;
          // 开机默认打开背光（D4/GPIO2）
          id(backlight_pin).turn_on();
          id(backlight_state) = true;
          // 新增：重置 last_merged_uptime
          id(last_merged_uptime) = 0.0;

esp8266:
  board: d1_mini

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "LCD1602-Fallback"
    password: "12345678"

logger:
  baud_rate: 0

api:
# OTA列表格式（旧版本必填）
ota:
  - platform: esphome

web_server:
  port: 80

# 全局变量：每行的实体选择索引（对应下拉菜单选项）
globals:
  - id: display_page
    type: int
    initial_value: '0'
  - id: switch_timer
    type: int
    initial_value: '0'
  - id: switch_seconds
    type: int
    restore_value: true
    initial_value: '30'
  - id: fixed_page
    type: int
    restore_value: true
    initial_value: '-1'
  # 新增：刷新时间索引（对应下拉菜单）
  - id: refresh_interval_selected
    type: int
    restore_value: true
    initial_value: '2' # 默认1秒
  
  # 5个可配置行的选择索引（0-22对应所有实体）
  - id: p0l0_selected
    type: int
    restore_value: true
    initial_value: '0'
  - id: p0l1_selected
    type: int
    restore_value: true
    initial_value: '1'
  - id: p1l0_selected
    type: int
    restore_value: true
    initial_value: '12'
  - id: p1l1_selected
    type: int
    restore_value: true
    initial_value: '10'
  - id: p2l0_selected
    type: int
    restore_value: true
    initial_value: '2'
  - id: p2l1_selected
    type: int
    restore_value: true
    initial_value: '9'
  - id: p3l0_selected
    type: int
    restore_value: true
    initial_value: '16'
  - id: p3l1_selected
    type: int
    restore_value: true
    initial_value: '17'
  - id: p4l0_selected
    type: int
    restore_value: true
    initial_value: '19'
  - id: p4l1_selected
    type: int
    restore_value: true
    initial_value: '20'
  
  - id: restart_count
    type: int
    restore_value: true
    initial_value: '0'
  # 新增：背光状态
  - id: backlight_state
    type: bool
    restore_value: true
    initial_value: 'true'

  # 新增：总运行时间累计基数（秒）
  - id: total_uptime_base
    type: float
    restore_value: true
    initial_value: '0.0'
  # 新增：上次合并时的 uptime 秒数（不保存，启动时重置）
  - id: last_merged_uptime
    type: float
    restore_value: false
    initial_value: '0.0'

# 新增：背光GPIO定义 - 修改为D4（GPIO2）
output:
  - platform: gpio
    pin: GPIO2 # D4，PCF8574T背光控制端口
    id: backlight_pin
    inverted: false # 如果背光低电平点亮，改为true

time:
  - platform: homeassistant
    id: ha_time

i2c:
  sda: GPIO4 # D2 - PCF8574T SDA
  scl: GPIO5 # D1 - PCF8574T SCL
  scan: True

sensor:
  # 系统运行时间（秒）
  - platform: uptime
    id: uptime_sec
    update_interval: 60s

  # 格式化运行时间（小时）
  - platform: template
    name: "LCD Device Uptime"
    id: uptime_human
    unit_of_measurement: "h"
    accuracy_decimals: 1
    update_interval: 60s
    lambda: |-
      float uptime_hours = id(uptime_sec).state / 3600.0;
      return uptime_hours;

  # WiFi信号
  - platform: wifi_signal
    id: wifi_rssi
    name: "LCD WiFi RSSI"
    update_interval: 10s

  # WiFi质量百分比
  - platform: template
    name: "LCD WiFi Quality"
    id: wifi_quality
    unit_of_measurement: "%"
    update_interval: 10s
    lambda: |-
      int rssi = id(wifi_rssi).state;
      return (rssi <= -100) ? 0 : (rssi >= -50) ? 100 : 2 * (rssi + 100);

  # 剩余内存
  - platform: template
    name: "LCD Free Memory"
    id: free_memory
    unit_of_measurement: "KB"
    update_interval: 30s
    lambda: |-
      return ESP.getFreeHeap() / 1024.0;

  # 内存占用百分比
  - platform: template
    name: "LCD Memory Usage"
    id: memory_usage
    unit_of_measurement: "%"
    update_interval: 30s
    lambda: |-
      float free = id(free_memory).state;
      float total = 80.0;
      return 100.0 - (free / total) * 100.0;

  # 重启次数
  - platform: template
    name: "LCD Restart Count"
    id: restart_count_sensor
    unit_of_measurement: "次"
    state_class: total_increasing
    update_interval: 60s
    lambda: |-
      return id(restart_count);

  # 新增：总运行时间（秒）
  - platform: template
    name: "LCD Total Uptime (seconds)"
    id: total_uptime_sec
    unit_of_measurement: "s"
    accuracy_decimals: 0
    update_interval: 60s
    lambda: |-
      return id(total_uptime_base) + (id(uptime_sec).state - id(last_merged_uptime));

  # 新增：总运行时间（小时）
  - platform: template
    name: "LCD Total Uptime"
    id: total_uptime_human
    unit_of_measurement: "h"
    accuracy_decimals: 1
    update_interval: 60s
    lambda: |-
      float total_sec = id(total_uptime_base) + (id(uptime_sec).state - id(last_merged_uptime));
      return total_sec / 3600.0;

  # HA实体 - 原有
  - platform: homeassistant
    id: elec_today
    entity_id: sensor.tasmota_energy_today

  - platform: homeassistant
    id: gas_today
    entity_id: sensor.jin_ri_ran_qi_liang

  - platform: homeassistant
    id: power_now
    entity_id: sensor.tasmota_energy_power

  - platform: homeassistant
    id: pi_uptime
    entity_id: sensor.raspberrypi_uptime

  - platform: homeassistant
    id: dns_queries
    entity_id: sensor.pi_hole_dns_queries_today

  - platform: homeassistant
    id: dns_blocked
    entity_id: sensor.pi_hole_ads_blocked_today

  # 新增：拓竹打印机实体
  - platform: homeassistant
    id: bambu_remaining_time
    entity_id: sensor.a1_03900d592302392_remaining_time

  - platform: homeassistant
    id: bambu_total_usage
    entity_id: sensor.a1_03900d592302392_total_usage

  - platform: homeassistant
    id: bambu_print_progress
    entity_id: sensor.a1_03900d592302392_print_progress

  # 新增：温湿度、甲醛传感器
  - platform: homeassistant
    id: temperature
    entity_id: sensor.xiaomi_cn_696390770_va3_temperature_p_3_7

  - platform: homeassistant
    id: humidity
    entity_id: sensor.xiaomi_cn_696390770_va3_relative_humidity_p_3_1

  - platform: homeassistant
    id: hcho_density
    entity_id: sensor.xiaomi_cn_696390770_va3_hcho_density_p_3_11

  # 新增：ES6汽车相关
  - platform: homeassistant
    id: es6_soc
    entity_id: sensor.soc

  - platform: homeassistant
    id: es6_remaining_range
    entity_id: sensor.remaining_actual_range

  - platform: homeassistant
    id: es6_mileage
    entity_id: sensor.mileage

  # 新增：路由器网速
  - platform: homeassistant
    id: router_download
    entity_id: sensor.xiao_ai_yin_xiang_upnp_download_speed

  - platform: homeassistant
    id: router_upload
    entity_id: sensor.xiao_ai_yin_xiang_upnp_upload_speed

