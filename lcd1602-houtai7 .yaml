  # 新增：刷新时间选择（替代原6个时间按钮）
  - platform: template
    name: "LCD Refresh Interval"
    id: refresh_interval_select
    icon: mdi:timer-refresh
    options:
      - "1秒"
      - "2秒"
      - "3秒"
      - "5秒"
      - "10秒"
      - "15秒"
      - "20秒"
      - "25秒"
      - "30秒"
    initial_option: "1秒"
    restore_value: true
    optimistic: true
    set_action:
      then:
        - lambda: |-
            std::string val = x;
            if (val == "1秒") id(switch_seconds) = 1;
            else if (val == "2秒") id(switch_seconds) = 2;
            else if (val == "3秒") id(switch_seconds) = 3;
            else if (val == "5秒") id(switch_seconds) = 5;
            else if (val == "10秒") id(switch_seconds) = 10;
            else if (val == "15秒") id(switch_seconds) = 15;
