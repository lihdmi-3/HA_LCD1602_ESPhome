# =========================
# 按钮组件（保留核心功能，移除原时间按钮）
# =========================
button:
  # 自动/固定页面
  - platform: template
    name: "LCD Auto Switch Page"
    icon: mdi:autorenew
    on_press:
      then:
        - lambda: |-
            id(fixed_page) = -1;
            id(switch_timer) = 0;

  - platform: template
    name: "LCD Fixed Page0"
    icon: mdi:page-first
    on_press:
      then:
        - lambda: |-
            id(fixed_page) = 0;
            id(display_page) = 0;
            id(lcd_display).update();

  - platform: template
    name: "LCD Fixed Page1"
    icon: mdi:page-middle
    on_press:
      then:
        - lambda: |-
            id(fixed_page) = 1;
            id(display_page) = 1;
            id(lcd_display).update();

  - platform: template
    name: "LCD Fixed Page2"
    icon: mdi:page-last
    on_press:
      then:
        - lambda: |-
            id(fixed_page) = 2;
            id(display_page) = 2;
            id(lcd_display).update();

  - platform: template
    name: "LCD Fixed Page3"
    icon: mdi:page-next
    on_press:
      then:
        - lambda: |-
            id(fixed_page) = 3;
            id(display_page) = 3;
            id(lcd_display).update();

  - platform: template
    name: "LCD Fixed Page4"
    icon: mdi:page-last
    on_press:
      then:
        - lambda: |-
            id(fixed_page) = 4;
            id(display_page) = 4;
            id(lcd_display).update();

  # 新增：背光控制按钮（D4/GPIO2）
  - platform: template
    name: "LCD Backlight On"
    icon: mdi:lightbulb-on
    on_press:
      then:
        - lambda: |-
            id(backlight_pin).turn_on();
            id(backlight_state) = true;

  - platform: template
    name: "LCD Backlight Off"
    icon: mdi:lightbulb-off
    on_press:
      then:
        - lambda: |-
            id(backlight_pin).turn_off();
            id(backlight_state) = false;

  # 基础功能
  - platform: restart
    name: "LCD Restart"
    icon: mdi:restart-alert

  - platform: template
    name: "LCD Refresh Display"
    icon: mdi:refresh
    on_press:
      then:
        - component.update: lcd_display

# =========================
# 开关组件（修复restore_state报错 + GPIO调用错误）
# =========================
switch:
  - platform: template
    name: "LCD Backlight"
    id: backlight_switch
    icon: mdi:lightbulb
    # 替换restore_state为restore_mode，兼容新版本ESPHome
    restore_mode: RESTORE_DEFAULT_ON # 恢复上次状态，默认打开
    optimistic: true
    turn_on_action:
      - lambda: |-
          id(backlight_pin).turn_on();
          id(backlight_state) = true;
    turn_off_action:
      - lambda: |-
          id(backlight_pin).turn_off();
          id(backlight_state) = false;

# 页面切换定时器
interval:
  - interval: 1s
    then:
      - lambda: |-
          if (id(fixed_page) == -1) {
            id(switch_timer)++;
            if (id(switch_timer) >= id(switch_seconds)) {
              id(display_page) = (id(display_page) + 1) % 5;  // 修改为5个页面循环
              id(switch_timer) = 0;
            }
          }

  # 新增：每小时合并一次 uptime 到累计基数
  - interval: 1h
    then:
      - lambda: |-
          float current_uptime = id(uptime_sec).state;
          float last = id(last_merged_uptime);
          float delta = current_uptime - last;
          if (delta > 0) {
            id(total_uptime_base) += delta;
            id(last_merged_uptime) = current_uptime;
          }

# LCD显示逻辑（PCF8574T驱动，D4控制背光）
display:
  - platform: lcd_pcf8574
    id: lcd_display
    dimensions: 16x2
    address: 0x27 # PCF8574T默认地址，可根据实际修改
    update_interval: 1s
    lambda: |-
      // 定义显示实体的函数（内部lambda函数）
      auto print_entity = [&](int line, int pos, int entity_id) {
        // 提前定义time变量，避免switch-case交叉初始化问题
        esphome::ESPTime time;
        
        switch (entity_id) {
          case 0: // 今日电量
            if (id(elec_today).has_state()) {
              it.printf(pos, line, "Elec: %.2f kWh", id(elec_today).state);
            } else {
              it.print(pos, line, "Elec: N/A");
            }
            break;
          case 1: // 今日燃气
            if (id(gas_today).has_state()) {
              it.printf(pos, line, "Gas : %.2f m3", id(gas_today).state);
            } else {
              it.print(pos, line, "Gas: N/A");
            }
            break;
          case 2: // 当前功率
            if (id(power_now).has_state()) {
              it.printf(pos, line, "Power: %d W", (int)id(power_now).state);
            } else {
              it.print(pos, line, "Power: N/A");
            }
            break;
          case 3: // WiFi质量
            if (id(wifi_quality).has_state()) {
              it.printf(pos, line, "WiFi: %.0f %%", id(wifi_quality).state);
            } else {
              it.print(pos, line, "WiFi: N/A");
            }
            break;
          case 4: // WiFi信号
            if (id(wifi_rssi).has_state()) {
              it.printf(pos, line, "RSSI: %d dBm", (int)id(wifi_rssi).state);
            } else {
              it.print(pos, line, "RSSI: N/A");
            }
            break;
          case 5: // 剩余内存
            if (id(free_memory).has_state()) {
              it.printf(pos, line, "Mem_free: %.0f KB", id(free_memory).state);
            } else {
              it.print(pos, line, "Mem: N/A");
            }
            break;
          case 6: // 内存占用
            if (id(memory_usage).has_state()) {
              it.printf(pos, line, "MemUse: %.0f %%", id(memory_usage).state);
            } else {
              it.print(pos, line, "MemUse: N/A");
            }
            break;
          case 7: // 设备运行时间
            if (id(uptime_human).has_state()) {
              it.printf(pos, line, "Uptime: %.1f h", id(uptime_human).state);
            } else {
              it.print(pos, line, "Uptime: N/A");
            }
            break;
          case 8: // 重启次数
            if (id(restart_count_sensor).has_state()) {
              it.printf(pos, line, "Restart: %d", (int)id(restart_count_sensor).state);
            } else {
              it.print(pos, line, "Restart: N/A");
            }
            break;
          case 9: // Pi运行时间
            if (id(pi_uptime).has_state()) {
              it.printf(pos, line, "Pi Uptime: %d d", (int)id(pi_uptime).state);
            } else {
              it.print(pos, line, "Pi: N/A");
            }
            break;
          case 10: // DNS查询数
            if (id(dns_queries).has_state()) {
              it.printf(pos, line, "DNS : %d", (int)id(dns_queries).state);
            } else {
              it.print(pos, line, "DNS: N/A");
            }
            break;
          case 11: // DNS拦截数
            if (id(dns_blocked).has_state()) {
              it.printf(pos, line, "DNSBlock: %d", (int)id(dns_blocked).state);
            } else {
              it.print(pos, line, "DNSBlock: N/A");
            }
            break;
          case 12: // 系统时间
            time = id(ha_time).now();
            if (time.is_valid()) {
              it.strftime(pos, line, "Time: %H:%M:%S", time);
            } else {
              it.print(pos, line, "Time: N/A");
            }
            break;
          case 13: // 拓竹剩余时间
            if (id(bambu_remaining_time).has_state()) {
              int mins = (int)id(bambu_remaining_time).state;
              int hours = mins / 60;
              mins = mins % 60;
              it.printf(pos, line, "Bambu: %dh%dm", hours, mins);
            } else {
              it.print(pos, line, "Bambu: N/A");
            }
            break;
          case 14: // 拓竹总使用时间（修改：直接使用小时单位）
            if (id(bambu_total_usage).has_state()) {
              float hours = id(bambu_total_usage).state;
              it.printf(pos, line, "BambuTotal: %.0f h", hours);
            } else {
              it.print(pos, line, "BambuTotal: N/A");
            }
            break;
          case 15: // 拓竹打印进度
            if (id(bambu_print_progress).has_state()) {
              it.printf(pos, line, "BambuProg: %.0f %%", id(bambu_print_progress).state);
            } else {
              it.print(pos, line, "BambuProg: N/A");
            }
            break;

          case 16: // 温度
            if (id(temperature).has_state()) {
              it.printf(pos, line, "Temp: %.1f C", id(temperature).state);
            } else {
              it.print(pos, line, "Temp: N/A");
            }
            break;
          case 17: // 湿度
            if (id(humidity).has_state()) {
              it.printf(pos, line, "Humi: %.0f %%", id(humidity).state);
            } else {
              it.print(pos, line, "Humi: N/A");
            }
            break;
          case 18: // 甲醛浓度
            if (id(hcho_density).has_state()) {
              it.printf(pos, line, "HCHO: %.3f mg/m3", id(hcho_density).state);
            } else {
              it.print(pos, line, "HCHO: N/A");
            }
            break;

          case 19: // ES6剩余电量
            if (id(es6_soc).has_state()) {
              it.printf(pos, line, "ES6 SOC: %.0f %%", id(es6_soc).state);
            } else {
              it.print(pos, line, "ES6 SOC: N/A");
            }
            break;
          case 20: // ES6实估续航
            if (id(es6_remaining_range).has_state()) {
              it.printf(pos, line, "ES6 Range: %dkm", (int)id(es6_remaining_range).state);
            } else {
              it.print(pos, line, "ES6 Range: N/A");
            }
            break;
          case 21: // ES6累计里程
            if (id(es6_mileage).has_state()) {
              it.printf(pos, line, "ES6 Mile:%dkm", (int)id(es6_mileage).state);
            } else {
              it.print(pos, line, "ES6 Mile: N/A");
            }
            break;

          case 22: // 路由器下载速度
            if (id(router_download).has_state()) {
              it.printf(pos, line, "DL: %.0f kbit/s", id(router_download).state);
            } else {
              it.print(pos, line, "DL: N/A");
            }
            break;
          case 23: // 路由器上传速度
            if (id(router_upload).has_state()) {
              it.printf(pos, line, "UL: %.0f kbit/s", id(router_upload).state);
            } else {
              it.print(pos, line, "UL: N/A");
            }
            break;
          default:
            it.print(pos, line, "N/A");
        }
      };

      // 确定当前显示页面
      int page = id(display_page);
      if (id(fixed_page) >= 0) {
        page = id(fixed_page);
      }

      // 清空屏幕
      it.clear();

      // Page0显示
      if (page == 0) {
        print_entity(0, 0, id(p0l0_selected));
        print_entity(1, 0, id(p0l1_selected));
      }
      // Page1显示
      else if (page == 1) {
        print_entity(0, 0, id(p1l0_selected));
        print_entity(1, 0, id(p1l1_selected));
      }
      // Page2显示
      else if (page == 2) {
        print_entity(0, 0, id(p2l0_selected));
        print_entity(1, 0, id(p2l1_selected));
      }
      // Page3显示（新增）
      else if (page == 3) {
        print_entity(0, 0, id(p3l0_selected));
        print_entity(1, 0, id(p3l1_selected));
      }
      // Page4显示（新增）
      else if (page == 4) {
        print_entity(0, 0, id(p4l0_selected));
        print_entity(1, 0, id(p4l1_selected));
      }